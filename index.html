<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- Login-page -->

<section id="loginPage">

<div class="loginCard">

<h2><img src="./assets/github-logo.png" alt="logo"><br>
     GitHub Issues Tracker</h2>

<p>Sign in to manage your issues</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<p class="demo">Demo: admin / admin123</p>

<p id="loginError"></p>

</div>

</section>

<!-- login page end -->

<!-- DASHBOARD -->

<section id="dashboard">

<nav class="navbar">

<div class="logo">
    GitHub Issues Tracker


</div>

<div class="navRight">

<input id="search" placeholder="Search issues">

</div>

</nav>

<!-- dashboard end -->

<!-- TABS -->

<div class="tabs">

<button class="tab active" onclick="setTab('all')">All</button>
<button class="tab" onclick="setTab('open')">Open</button>
<button class="tab" onclick="setTab('closed')">Closed</button>

</div>

<!-- tab end -->


<!-- label -->

<div class="labelFilters">

<button onclick="setLabel('all')">All Labels</button>
<button onclick="setLabel('BUG')">BUG</button>
<button onclick="setLabel('HELP WANTED')">HELP WANTED</button>
<button onclick="setLabel('ENHANCEMENT')">ENHANCEMENT</button>

</div>


<!-- issue -->

<div class="issuesHeader">

<div class="left">

⚙ <span id="count"></span>
<p>Track and manage your project issues</p>

</div>

<div class="right">

<span class="dot openDot"></span> Open
<span class="dot closedDot"></span> Closed

</div>

</div>


<div id="spinner"></div>

<div id="issuesGrid"></div>

</section>

<!-- issue end -->



<!-- MODAL -->

<div id="modal">

<div class="modalCard">

<span id="mStatus" class="status"></span>

<h2 id="mTitle"></h2>

<div class="badges">

<span id="mPriority" class="badge priority"></span>
<span id="mLabel" class="badge"></span>

</div>

<p id="mDesc"></p>

<div class="modalFooter">

<div>
<b>Assignee</b>
<p id="mAuthor"></p>
</div>

<div>
<b>Created</b>
<p id="mDate"></p>
</div>

<button onclick="closeModal()">Close</button>

</div>

</div>

</div>

<!-- model end -->


<script src="./script.js"></script>

</body>
</html>
